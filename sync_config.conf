# =============================================================================
# 同步配置文件
# 用于配置 Gerrit -> Github 同步的参数
# =============================================================================

# 目录配置
GERRIT_DIR="/media/cvitek/ke.yi/mycode/sophon/dailybuild/auto_sync_prj/gerrit_a2_release_code"
GITHUB_DIR="/media/cvitek/ke.yi/mycode/sophon/dailybuild/auto_sync_prj/github_release_code_bm1688"
LOG_DIR="/media/cvitek/ke.yi/mycode/sophon/dailybuild/auto_sync_prj/logs"

# 排除模式 (每行一个模式，支持通配符)
# 这些文件/目录不会被同步
EXCLUDE_PATTERNS=(
    ".git/"
    ".repo/"
    ".gitmodules"
    ".gitignore"
    "*.orig"
    "*.rej"
    ".cursor/"
    "*.log"
    "*.tmp"
    "*.swp"
    "*.swo"
    "*~"
)

# 同步选项
# DELETE_MISSING: 是否删除目标目录中源目录没有的文件 (true/false)
DELETE_MISSING=true

# PRESERVE_PERMISSIONS: 是否保留文件权限 (true/false)
PRESERVE_PERMISSIONS=true

# 性能选项
# PARALLEL_JOBS: 并行同步的目录数量 (1-8)
PARALLEL_JOBS=2

# 日志选项
# MAX_LOG_DAYS: 日志文件保留天数
MAX_LOG_DAYS=30
