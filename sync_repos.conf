# =============================================================================
# Gerrit -> Github 同步配置文件
# 用于控制哪些仓库需要同步
# =============================================================================

# 基础目录配置
GERRIT_DIR="/media/cvitek/ke.yi/mycode/sophon/dailybuild/auto_sync_prj/gerrit_a2_release_code"
GITHUB_DIR="/media/cvitek/ke.yi/mycode/sophon/dailybuild/auto_sync_prj/github_release_code_bm1688"
LOG_DIR="/media/cvitek/ke.yi/mycode/sophon/dailybuild/auto_sync_prj/logs"

# =============================================================================
# 同步策略控制
# =============================================================================

# 是否同步【共同仓库】（两个代码库都存在的仓库）
# 这些仓库只同步文件差异，不删除 Github 端特有的文件
SYNC_COMMON_REPOS=true

# 是否同步【子目录映射】（如 libsophav, isp 等）
SYNC_SUBDIR_MAPPINGS=true

# 是否复制【仅 Gerrit 有的仓库】到 Github
# 设置为 false 可以跳过这些仓库的同步
SYNC_GERRIT_ONLY_REPOS=false

# =============================================================================
# 仓库排除列表
# 在这里列出的仓库将被跳过，不进行同步
# =============================================================================

# 排除的共同仓库（即使路径相同也不同步）
# 格式: "仓库名"
EXCLUDE_COMMON_REPOS=(
    # 特殊处理的仓库，需要手动编译后再同步
    "fsbl"
)

# 排除的子目录映射
# 格式: "源路径"
EXCLUDE_SUBDIR_MAPPINGS=(
    # 示例:
    # "libsophon/libsophav"
)

# 排除的 Gerrit 特有仓库（即使 SYNC_GERRIT_ONLY_REPOS=true 也不同步）
# 格式: "仓库名"
EXCLUDE_GERRIT_ONLY_REPOS=(
    # 默认排除所有，如需同步请注释掉或删除
    "arm-trusted-firmware"
    "frameworks"
    "mediapipe"
    "opensbi"
    "pytest"
    "rel_bin"
    "sophgo-develop-docs"
    "testcases"
    "tools"
    "tpu-kernel"
)

# =============================================================================
# 自定义同步规则（高级）
# =============================================================================

# 额外的同步规则
# 格式: ["源路径"]="目标路径"
# 用于自定义同步某些特殊目录
declare -A CUSTOM_SYNC_RULES=(
    # 示例:
    # ["gerrit_a2_release_code/some/path"]="github_release_code_bm1688/other/path"
)

# =============================================================================
# rsync 选项
# =============================================================================

# rsync 排除模式
RSYNC_EXCLUDES=(
    ".git/"
    ".repo/"
    ".gitmodules"
    ".gitignore"
    "*.orig"
    "*.rej"
    "*.log"
    "*.tmp"
    "__pycache__/"
    "*.pyc"
)

# 是否删除目标端多余的文件（危险！请谨慎开启）
# true = 删除 Github 中有但 Gerrit 中没有的文件
# false = 保留 Github 中额外的文件
DELETE_EXTRA_FILES=false

# =============================================================================
# 分支配置
# 定义每个仓库在 Gerrit 和 Github 中对应的分支
# 格式: [仓库名]="gerrit分支:github分支"
# =============================================================================

declare -A REPO_BRANCHES=(
    # 共同仓库
    ["cvi_rtsp"]="a2_release:master"
    ["fsbl"]="a2_release:bm1688"
    ["host-tools"]="master:master"
    ["isp-tool-daemon"]="a2_release:bm1688"
    ["isp_tuning"]="a2_release:bm1688"
    ["libsophon"]="a2_release:bm1688"
    ["linux_5.10"]="a2_release:bm1688"
    ["linux-common"]="dev-edge-6.12.61:linux-6.12.y"
    ["sophon_media"]="release:master"
    ["tdl_sdk"]="a2_release:bm1688"
    ["u-boot-2021.10"]="a2_release:bm1688"

    # 子目录映射
    ["libsophon/libsophav"]="release:bm1688"
    ["sophon_media/libsophav"]="release:bm1688"
    ["middleware/v2/modules/isp"]="a2_release:bm1688"
    ["middleware/v2/component/SensorSupportList"]="a2_release:bm1688"
    ["ubuntu/bootloader-arm64"]="a2_release:bm1688"
    ["frameworks/nvr_edge"]="v2.4:bm1688"
)

# 是否自动切换分支
# true = 同步前自动切换到对应分支并拉取最新代码
# false = 使用当前分支代码（不切换）
AUTO_SWITCH_BRANCH=true
