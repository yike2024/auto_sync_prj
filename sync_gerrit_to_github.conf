GERRIT_DIR="/media/cvitek/ke.yi/mycode/sophon/dailybuild/auto_sync_prj/gerrit_a2_release_code"
GITHUB_DIR="/media/cvitek/ke.yi/mycode/sophon/dailybuild/auto_sync_prj/github_release_code_bm1688"
LOG_DIR="/media/cvitek/ke.yi/mycode/sophon/dailybuild/auto_sync_prj/logs"

# 同步前若未做 repo 准备，是否按 manifest 在 Gerrit 源仓单独 checkout 分支
AUTO_CHECKOUT_GERRIT=true
# rsync 是否删除 Github 侧多出的文件（慎用，true 会 --delete）
DELETE_EXTRA_FILES=false
# 只更新 Github 已有文件，不把 Gerrit 独有文件拷到 Github
SYNC_ONLY_EXISTING=true
# 预览模式：不实际 rsync、不执行 repo 清理等写操作（一般由命令行 --dry-run 覆盖）
DRY_RUN=false

# 执行 --sync 前是否先做 repo sync / clean / 切分支
REPO_PREPARE_BEFORE_SYNC=true
# repo 准备是否包含 Gerrit 侧
REPO_PREPARE_GERRIT=true
# repo 准备是否包含 Github 侧
REPO_PREPARE_GITHUB=true
# repo 准备时是否对每个子仓 git reset --hard && git clean -fdx
REPO_CLEAN_WORKTREE=true
# repo sync 并行任务数
REPO_SYNC_J=4
# 内部标记：repo 准备流程是否已切换过分支（勿改）
REPO_BRANCHES_APPLIED=false

# 同步完成后是否在 Github 侧自动 git add（不 commit）；建议 false，手动 add 便于审查
GIT_STAGE_AFTER_SYNC=false

GERRIT_DEFCONFIG_FSBL="edge_wevb_emmc"
GERRIT_DEFCONFIG_LINUX_510="edge_wevb_emmc"
GERRIT_DEFCONFIG_LINUX_COMMON="edge_emmc_debian"

TDE_2D_ENGINE_REL="osdrv/interdrv/v2/2d_engine"

# SYNC_REPO_RULES: 仅下列仓库参与同步，未列入的不处理
# 每条格式: Gerrit路径:Github路径:子目录标志
#   子目录标志 0 = Github manifest 中该路径仍是独立子仓库（单独 rsync、Github 在该路径切分支）
#   子目录标志 1 = Github 无该路径的独立仓库，内容并入父仓库目录同步（Github 在父仓根目录切分支）
SYNC_REPO_RULES=(
    "build:build:0"
    "buildroot:buildroot:0"
    "host-tools:host-tools:0"
    "u-boot-2021.10:u-boot-2021.10:0"
    "linux_5.10:linux_5.10:0"
    "linux-common:linux-common:0"
    "osdrv:osdrv:0"
    "ramdisk:ramdisk:0"
    "oss:oss:0"
    "middleware:middleware:0"
    "middleware/v2/modules/isp:middleware/v2/modules/isp:0"
    "middleware/v2/component/SensorSupportList:middleware/v2/component/SensorSupportList:1"
    "isp_tuning:isp_tuning:0"
    "isp-tool-daemon:isp-tool-daemon:0"
    "cvi_rtsp:cvi_rtsp:0"
    "fsbl:fsbl:0"
    "libsophon:libsophon:0"
    "libsophon/libsophav:libsophon/libsophav:0"
    "sophon_media:sophon_media:0"
    "sophon_media/libsophav:sophon_media/libsophav:0"
    "tdl_sdk:tdl_sdk:0"
    "ubuntu/bootloader-arm64:ubuntu/bootloader-arm64:0"
)

RSYNC_EXCLUDES=(
    ".git/"
    ".repo/"
    ".gitmodules"
    ".gitignore"
    "*.orig"
    "*.rej"
    "*.log"
    "*.tmp"
    "__pycache__/"
    "*.pyc"
)

RSYNC_BUILD_ARTIFACT_EXCLUDES=(
    "*.o"
    "*.ko"
    "*.mod"
    "*.mod.*"
    ".*.cmd"
    "Module.symvers"
    "modules.order"
    ".tmp_versions/"
)
